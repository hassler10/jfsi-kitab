<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JFSI — Dictionnaire Islamique</title>
    <link rel="stylesheet" href="../css/global.css" />
    <style>
      .page-hero {
        padding: 140px 60px 60px;
        text-align: center;
        background: linear-gradient(
          180deg,
          rgba(26, 58, 42, 0.3),
          var(--noir-doux)
        );
      }
      .page-hero .hero-arabic {
        font-family: "Amiri", serif;
        font-size: clamp(20px, 3vw, 36px);
        color: var(--or);
        direction: rtl;
        margin-bottom: 16px;
      }
      .page-hero h1 {
        font-family: "Cinzel Decorative", serif;
        font-size: clamp(28px, 4vw, 48px);
        color: var(--blanc);
        margin-bottom: 10px;
      }
      .page-hero p {
        font-size: 15px;
        color: rgba(249, 245, 236, 0.7);
        max-width: 600px;
        margin: 0 auto;
      }

      .dict-section {
        padding: 0 60px 80px;
        max-width: 1300px;
        margin: 0 auto;
      }

      /* Barre de recherche */
      .search-section {
        margin-bottom: 50px;
        text-align: center;
      }
      .search-container {
        max-width: 600px;
        margin: 0 auto;
        position: relative;
      }
      .search-input {
        width: 100%;
        padding: 16px 50px 16px 20px;
        border: 2px solid rgba(201, 168, 76, 0.2);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--blanc);
        font-size: 16px;
        font-family: "Lato", sans-serif;
        outline: none;
        transition: all 0.3s;
      }
      .search-input:focus {
        border-color: var(--or);
        background: rgba(255, 255, 255, 0.08);
      }
      .search-btn {
        position: absolute;
        right: 5px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--or);
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.3s;
      }
      .search-btn:hover {
        background: var(--vert);
        transform: translateY(-50%) scale(1.05);
      }

      /* Filtres par thème */
      .theme-filters {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }
      .theme-btn {
        padding: 10px 20px;
        border-radius: 25px;
        border: 2px solid rgba(201, 168, 76, 0.2);
        background: transparent;
        color: var(--gris);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.3s;
        font-family: "Lato", sans-serif;
      }
      .theme-btn:hover,
      .theme-btn.active {
        border-color: var(--or);
        color: var(--or);
        background: rgba(201, 168, 76, 0.1);
      }

      /* Grille des termes */
      .terms-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
      }
      .term-card {
        background: rgba(13, 31, 21, 0.7);
        border: 1px solid rgba(201, 168, 76, 0.13);
        border-radius: 12px;
        padding: 24px;
        transition: all 0.3s;
        cursor: pointer;
      }
      .term-card:hover {
        transform: translateY(-4px);
        border-color: rgba(201, 168, 76, 0.4);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }
      .term-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .term-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--vert-moyen), var(--vert));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .term-title {
        font-family: "Amiri", serif;
        font-size: 18px;
        color: var(--blanc);
        font-weight: 600;
      }
      .term-category {
        font-size: 10px;
        color: var(--or);
        background: rgba(201, 168, 76, 0.1);
        padding: 3px 8px;
        border-radius: 10px;
        border: 1px solid rgba(201, 168, 76, 0.2);
      }
      .term-definition {
        font-size: 14px;
        color: rgba(249, 245, 236, 0.8);
        line-height: 1.6;
        margin-bottom: 12px;
      }
      .term-arabic {
        font-family: "Amiri", serif;
        font-size: 16px;
        color: var(--or);
        direction: rtl;
        margin-bottom: 8px;
        text-align: right;
      }
      .term-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .term-tag {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 15px;
        background: rgba(201, 168, 76, 0.08);
        border: 1px solid rgba(201, 168, 76, 0.2);
        color: var(--or);
      }

      /* Message d'absence de résultats */
      .no-results {
        text-align: center;
        padding: 3rem 2rem;
        color: #666;
        grid-column: 1 / -1;
      }

      .no-results-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.7;
      }

      .no-results h3 {
        color: #2c3e50;
        margin-bottom: 0.5rem;
        font-size: 1.3rem;
      }

      .no-results p {
        max-width: 400px;
        margin: 0 auto;
        line-height: 1.6;
      }

      /* Modal de détail */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }
      .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--noir-doux);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 15px;
        max-width: 700px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }
      .modal-header {
        padding: 30px 30px 20px;
        border-bottom: 1px solid rgba(201, 168, 76, 0.1);
      }
      .modal-title {
        font-family: "Amiri", serif;
        font-size: 24px;
        color: var(--blanc);
        margin-bottom: 8px;
      }
      .modal-subtitle {
        font-size: 14px;
        color: var(--or);
        margin-bottom: 10px;
      }
      .modal-arabic {
        font-family: "Amiri", serif;
        font-size: 20px;
        color: var(--or);
        direction: rtl;
        text-align: right;
        margin-bottom: 15px;
      }
      .modal-body {
        padding: 20px 30px;
      }
      .modal-definition {
        font-size: 16px;
        color: rgba(249, 245, 236, 0.9);
        line-height: 1.7;
        margin-bottom: 20px;
      }
      .modal-examples {
        margin-bottom: 20px;
      }
      .modal-examples h4 {
        font-family: "Cinzel Decorative", serif;
        font-size: 14px;
        color: var(--or);
        margin-bottom: 10px;
      }
      .modal-examples ul {
        list-style: none;
        padding: 0;
      }
      .modal-examples li {
        padding: 8px 0;
        border-bottom: 1px solid rgba(201, 168, 76, 0.1);
        font-size: 14px;
        color: rgba(249, 245, 236, 0.8);
      }
      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.1);
        border: none;
        color: var(--or);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media (max-width: 768px) {
        .dict-section {
          padding: 0 30px 60px;
        }
        .page-hero {
          padding: 120px 30px 40px;
        }
        .terms-grid {
          grid-template-columns: 1fr;
        }
        .theme-filters {
          gap: 8px;
        }
        .theme-btn {
          padding: 8px 16px;
          font-size: 12px;
        }
        .modal-content {
          width: 95%;
        }
      }
    </style>
  </head>

      <h1>Dictionnaire Islamique</h1>
      <p>

      <div class="search-section">

        <button class="theme-btn" data-theme="spiritualite">
          Spiritualité
        </button>
        <button class="theme-btn" data-theme="histoire">Histoire</button>
      </div>

      <!-- GRILLE DES TERMES -->

      let currentFilter = "all";
      let filteredTerms = [...window.DICTIONARY_TERMS];

      // Fonctions de recherche et filtrage
      window.filterTerms = function () {
        console.log("filterTerms called");
        const searchInput = document.getElementById("search-input");
        const searchTerm = searchInput.value.toLowerCase().trim();

        console.log(
          "searchTerm:",
          `"${searchTerm}"`,
          "currentFilter:",
          currentFilter,
        );

        filteredTerms = window.DICTIONARY_TERMS.filter((term) => {
          // Si pas de terme de recherche, montrer tous les termes du filtre actuel
          if (searchTerm === "") {
            return currentFilter === "all" || term.category === currentFilter;
          }

          // Sinon, filtrer par recherche et catégorie
          const matchesSearch =
            term.title.toLowerCase().includes(searchTerm) ||
            term.arabic.includes(searchTerm) ||
            term.definition.toLowerCase().includes(searchTerm) ||
            term.tags.some((tag) => tag.toLowerCase().includes(searchTerm));

          const matchesFilter =
            currentFilter === "all" || term.category === currentFilter;

          return matchesSearch && matchesFilter;
        });

        renderTerms();
      };

      function renderTerms() {
        const grid = document.getElementById("terms-grid");
        const searchTerm = document.getElementById("search-input").value.trim();

        console.log(
          "renderTerms called with searchTerm:",
          `"${searchTerm}"`,
          "currentFilter:",
          currentFilter,
          "filteredTerms.length:",
          filteredTerms.length,
        );

        // Si pas de terme de recherche, ne rien afficher
        if (searchTerm === "") {
          grid.innerHTML = "";
          return;
        }

        // Si aucun résultat trouvé
        if (filteredTerms.length === 0) {
          grid.innerHTML = `
            <div class="no-results">
              <div class="no-results-icon">📭</div>
              <h3>Aucun résultat trouvé</h3>
              <p>Essayez de modifier vos termes de recherche ou sélectionnez une autre catégorie.</p>
            </div>
          `;
          return;
        }

        // Afficher les résultats
        grid.innerHTML = "";
        filteredTerms.forEach((term) => {
          const card = document.createElement("div");
          card.className = "term-card";
          card.onclick = () => openModal(term);

          card.innerHTML = `
      <div class="term-header">
        <div class="term-icon">${getCategoryIcon(term.category)}</div>
        <div class="term-title">${term.title}</div>
        <div class="term-category">${getCategoryName(term.category)}</div>
      </div>
      <div class="term-definition">${term.definition.substring(0, 120)}...</div>
      <div class="term-arabic">${term.arabic}</div>
      <div class="term-tags">
        ${term.tags.map((tag) => `<span class="term-tag">${tag}</span>`).join("")}
      </div>
    `;

          grid.appendChild(card);
        });
      }

      function getCategoryIcon(category) {
        const icons = {
          aqida: "🕌",
          fiqh: "⚖️",
          hadith: "📜",
          coran: "📖",
          spiritualite: "💎",
          histoire: "🏛️",
        };
        return icons[category] || "📚";
      }

      function getCategoryName(category) {
        const names = {
          aqida: "Aqîda",
          fiqh: "Fiqh",
          hadith: "Hadith",
          coran: "Coran",
          spiritualite: "Spiritualité",
          histoire: "Histoire",
        };
        return names[category] || category;
      }

      function openModal(term) {
        document.getElementById("modal-title").textContent = term.title;
        document.getElementById("modal-subtitle").textContent = getCategoryName(
          term.category,
        );
        document.getElementById("modal-arabic").textContent = term.arabic;
        document.getElementById("modal-definition").textContent =
          term.definition;

        const examplesHtml =
          term.examples.length > 0
            ? `<h4>Exemples d'utilisation :</h4><ul>${term.examples.map((ex) => `<li>${ex}</li>`).join("")}</ul>`
            : "";
        document.getElementById("modal-examples").innerHTML = examplesHtml;

        document.getElementById("modal-overlay").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modal-overlay").style.display = "none";
      }

      // Événements
      document.addEventListener("DOMContentLoaded", function () {
        const searchInput = document.getElementById("search-input");
        const searchBtn = document.querySelector(".search-btn");

        if (searchInput) {
          searchInput.addEventListener("input", window.filterTerms);
          console.log("Search input event attached");
        }
        if (searchBtn) {
          searchBtn.addEventListener("click", window.filterTerms);
          console.log("Search button event attached");
        }

        // Événements pour les boutons de thème
        document.querySelectorAll(".theme-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".theme-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.theme;
            window.filterTerms();
          });
        });
      });

        if (searchBtn) {
